<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock & Stopwatch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Digital Clock</h2>
        <div class="display" id="clock">00:00:00 AM</div>
    </div>

    <div class="container">
        <h2>Stopwatch</h2>
        <div class="display" id="stopwatch">00:00:00.00</div>
        <div class="controls">
            <button class="btn-start" id="startBtn" onclick="startStopwatch()">Start</button>
            <button class="btn-stop" id="stopBtn" onclick="stopStopwatch()">Stop</button>
            <button class="btn-reset" id="resetBtn" onclick="resetStopwatch()">Reset</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
